{% extends "dashboard.html" %}

{% block extra_head %}
{{ super() }}
<style>
  .chat-shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 180px);
    min-height: 520px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card-bg);
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: .85rem;
  }
  .chat-empty {
    margin: auto;
    color: var(--text-muted);
    font-size: .9rem;
    text-align: center;
  }
  .msg-row {
    display: flex;
    width: 100%;
  }
  .msg-row.user {
    justify-content: flex-end;
  }
  .msg-row.assistant {
    justify-content: flex-start;
  }
  .msg-bubble {
    max-width: min(78%, 760px);
    padding: .75rem .9rem;
    border-radius: 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: .9rem;
  }
  .msg-row.user .msg-bubble {
    background: var(--indigo);
    color: #fff;
    border-bottom-right-radius: 6px;
  }
  .msg-row.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg-sources {
    margin-top: .45rem;
    font-size: .78rem;
    color: var(--text-muted);
  }
  .msg-sources details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .4rem .55rem;
  }
  .msg-sources summary {
    cursor: pointer;
    font-weight: 600;
  }
  .msg-sources ul {
    margin: .45rem 0 0;
    padding-left: 1rem;
  }
  .chat-input-wrap {
    border-top: 1px solid var(--border);
    padding: .8rem;
    display: flex;
    gap: .55rem;
    background: var(--bg-alt);
  }
  .chat-input-wrap input {
    flex: 1;
    padding: .72rem .9rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--input-color);
    font-family: inherit;
    font-size: .9rem;
    outline: none;
  }
  .chat-input-wrap input:focus {
    border-color: var(--border-hover);
  }
  @media (max-width: 640px) {
    .chat-shell {
      min-height: 420px;
      height: calc(100vh - 140px);
    }
    .msg-bubble {
      max-width: 92%;
    }
  }
</style>
{% endblock %}

{% block dashboard_content %}
<div class="page-header">
  <div>
    <h1 data-i18n="chat.title">Chat con KB</h1>
  </div>
</div>

<div class="chat-shell">
  <div id="chatMessages" class="chat-messages">
    <div id="chatEmpty" class="chat-empty" data-i18n="chat.empty">Haz una pregunta para comenzar.</div>
  </div>
  <div class="chat-input-wrap">
    <input
      id="chatInput"
      type="text"
      data-i18n-ph="chat.placeholder"
      placeholder="Pregunta sobre tu Knowledge Base…"
      autocomplete="off"
    />
    <button id="chatSend" class="btn btn-primary" data-i18n="chat.send" onclick="sendChat()">Enviar</button>
  </div>
</div>

<script>
const _chatToken = () => localStorage.getItem('access_token');
const _chatAuthFetch = (url, opts = {}) => fetch(url, {
  ...opts,
  headers: { 'Authorization': 'Bearer ' + _chatToken(), ...(opts.headers || {}) }
});

const chatMessagesEl = document.getElementById('chatMessages');
const chatEmptyEl = document.getElementById('chatEmpty');
const chatInputEl = document.getElementById('chatInput');
const chatSendEl = document.getElementById('chatSend');
const chatHistory = [];

function addMessage(role, content, sources = []) {
  chatEmptyEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const wrap = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content || '';
  wrap.appendChild(bubble);

  if (role === 'assistant' && sources && sources.length) {
    const src = document.createElement('div');
    src.className = 'msg-sources';
    const title = (typeof t === 'function' ? t('chat.sources') : 'Sources');
    src.innerHTML = `<details><summary>${title}</summary><ul>${
      sources.map(s => `<li>${s.filename || '—'} · ${(s.score || 0).toFixed(3)}${s.page_range ? ` · ${s.page_range}` : ''}</li>`).join('')
    }</ul></details>`;
    wrap.appendChild(src);
  }

  row.appendChild(wrap);
  chatMessagesEl.appendChild(row);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

async function sendChat() {
  const question = (chatInputEl.value || '').trim();
  if (!question) return;

  chatInputEl.value = '';
  chatInputEl.disabled = true;
  chatSendEl.disabled = true;

  addMessage('user', question);

  try {
    const response = await _chatAuthFetch('/api/chat/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        history: chatHistory,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.detail || 'Request failed');
    }

    const body = await response.json();
    const answer = body.answer || '';
    const sources = Array.isArray(body.sources) ? body.sources : [];

    addMessage('assistant', answer, sources);
    chatHistory.push({ role: 'user', content: question });
    chatHistory.push({ role: 'assistant', content: answer });
  } catch (e) {
    addMessage('assistant', `Error: ${e.message || 'Unknown error'}`);
  } finally {
    chatInputEl.disabled = false;
    chatSendEl.disabled = false;
    chatInputEl.focus();
  }
}

chatInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});
</script>
{% endblock %}
