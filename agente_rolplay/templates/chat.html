{% extends "dashboard.html" %}

{% block extra_head %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  /* ── Outer wrapper ── */
  .chat-layout {
    display: flex;
    gap: 1rem;
    height: calc(100vh - 140px);
    min-height: 520px;
  }

  /* ── History sidebar ── */
  .chat-sidebar {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .chat-sidebar-header {
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }
  .btn-new-chat {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
    padding: .65rem .9rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--indigo);
    color: #fff;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    width: 100%;
  }
  .btn-new-chat:hover { opacity: .88; }
  .chat-history-label {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-muted);
    padding: .5rem .25rem .1rem;
  }
  .chat-history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: .2rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--card-bg);
    padding: .4rem;
  }
  .chat-history-empty {
    padding: 1.25rem .75rem;
    font-size: .82rem;
    color: var(--text-muted);
    text-align: center;
  }
  .chat-session-item {
    display: flex;
    align-items: center;
    gap: .35rem;
    padding: .55rem .65rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background .14s;
    border: 1px solid transparent;
  }
  .chat-session-item:hover { background: var(--surface-hover); }
  .chat-session-item.active {
    background: var(--surface);
    border-color: rgba(220,38,38,.15);
  }
  .chat-session-title {
    flex: 1;
    font-size: .82rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .chat-session-item.active .chat-session-title { color: var(--text); font-weight: 500; }
  .chat-session-delete {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: .85rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity .14s, background .14s;
    line-height: 1;
  }
  .chat-session-item:hover .chat-session-delete { opacity: 1; }
  .chat-session-delete:hover { background: var(--surface-hover); color: #dc2626; }

  /* ── Chat area ── */
  .chat-shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card-bg);
    overflow: hidden;
    min-width: 0;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .chat-empty {
    margin: auto;
    color: var(--text-muted);
    font-size: .9rem;
    text-align: center;
  }

  /* ── Message rows ── */
  .msg-row { display: flex; width: 100%; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }

  .msg-bubble {
    max-width: min(78%, 760px);
    padding: .8rem 1rem;
    border-radius: 14px;
    line-height: 1.6;
    word-break: break-word;
    font-size: .9rem;
  }
  .msg-row.user .msg-bubble {
    background: var(--indigo);
    color: #fff;
    border-bottom-right-radius: 5px;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 5px;
  }

  /* Markdown styles inside assistant bubble */
  .msg-bubble p { margin: 0 0 .6em; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: .7em 0 .3em; font-weight: 600; }
  .msg-bubble h1 { font-size: 1.15em; }
  .msg-bubble h2 { font-size: 1.05em; }
  .msg-bubble h3 { font-size: .97em; }
  .msg-bubble ul,.msg-bubble ol { margin: .3em 0 .6em 1.3em; padding: 0; }
  .msg-bubble li { margin-bottom: .2em; }
  .msg-bubble code {
    background: rgba(255,255,255,.08);
    border-radius: 4px;
    padding: .1em .35em;
    font-size: .85em;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,.25);
    border-radius: 8px;
    padding: .75rem 1rem;
    overflow-x: auto;
    margin: .5em 0;
  }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble em { font-style: italic; }
  .msg-bubble blockquote {
    border-left: 3px solid var(--indigo);
    margin: .4em 0;
    padding-left: .8em;
    color: var(--text-muted);
  }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size: .85em; }
  .msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: .35em .6em; text-align: left; }
  .msg-bubble th { background: var(--surface); font-weight: 600; }
  .msg-bubble a { color: var(--indigo); text-decoration: underline; }

  /* ── Thinking animation ── */
  .thinking-row { display: flex; width: 100%; }
  .thinking-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 5px;
    padding: .9rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .thinking-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: thinking-bounce 1.3s ease-in-out infinite;
  }
  .thinking-dot:nth-child(2) { animation-delay: .18s; }
  .thinking-dot:nth-child(3) { animation-delay: .36s; }
  @keyframes thinking-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .35; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* Sources */
  .msg-sources { margin-top: .5rem; font-size: .78rem; color: var(--text-muted); }
  .msg-sources details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .4rem .55rem;
  }
  .msg-sources summary { cursor: pointer; font-weight: 600; }
  .msg-sources ul { margin: .45rem 0 0; padding-left: 1rem; }

  /* Input bar */
  .chat-input-wrap {
    border-top: 1px solid var(--border);
    padding: .8rem;
    display: flex;
    gap: .55rem;
    background: var(--bg-alt);
  }
  .chat-input-wrap input {
    flex: 1;
    padding: .72rem .9rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--input-color);
    font-family: inherit;
    font-size: .9rem;
    outline: none;
  }
  .chat-input-wrap input:focus { border-color: var(--border-hover); }

  @media (max-width: 768px) {
    .chat-layout { flex-direction: column; height: auto; }
    .chat-sidebar { width: 100%; height: 200px; }
    .chat-shell { min-height: 420px; height: calc(100vh - 380px); }
    .msg-bubble { max-width: 92%; }
  }
</style>
{% endblock %}

{% block dashboard_content %}
<div class="page-header">
  <h1 data-i18n="chat.title">KB Chat</h1>
</div>

<div class="chat-layout">

  <!-- History sidebar -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <button class="btn-new-chat" onclick="newChat()" data-i18n="chat.new_chat">+ Nuevo chat</button>
      <div class="chat-history-label" data-i18n="chat.history_title">Chats anteriores</div>
    </div>
    <div class="chat-history-list" id="chatHistoryList">
      <div class="chat-history-empty" id="chatHistoryEmpty" data-i18n="chat.history_empty">Sin chats anteriores</div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-shell">
    <div id="chatMessages" class="chat-messages">
      <div id="chatEmpty" class="chat-empty" data-i18n="chat.empty">Haz una pregunta para comenzar.</div>
    </div>
    <div class="chat-input-wrap">
      <input
        id="chatInput"
        type="text"
        data-i18n-ph="chat.placeholder"
        placeholder="Pregunta sobre tu Knowledge Base…"
        autocomplete="off"
      />
      <button id="chatSend" class="btn btn-primary" data-i18n="chat.send" onclick="sendChat()">Enviar</button>
    </div>
  </div>

</div>

<script>
// Configure marked
marked.setOptions({ breaks: true, gfm: true });

const _chatToken = () => localStorage.getItem('access_token');
const _chatAuthFetch = (url, opts = {}) => fetch(url, {
  ...opts,
  headers: { 'Authorization': 'Bearer ' + _chatToken(), ...(opts.headers || {}) }
});

const STORAGE_KEY    = 'kb_chat_sessions';
const chatMessagesEl = document.getElementById('chatMessages');
const chatEmptyEl    = document.getElementById('chatEmpty');
const chatInputEl    = document.getElementById('chatInput');
const chatSendEl     = document.getElementById('chatSend');

let sessions = [];
let activeId = null;

// ── Persistence ────────────────────────────────────────────

function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { sessions = []; }
}
function saveSessions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
function getActive()    { return sessions.find(s => s.id === activeId) || null; }

// ── Session management ─────────────────────────────────────

function newChat() {
  const session = { id: Date.now().toString(), title: null, createdAt: Date.now(), messages: [] };
  sessions.unshift(session);
  saveSessions();
  setActiveSession(session.id);
}

function setActiveSession(id) {
  activeId = id;
  renderSidebar();
  renderMessages();
  chatInputEl.focus();
}

function deleteSession(id, e) {
  e.stopPropagation();
  if (!confirm(typeof t === 'function' ? t('chat.delete_confirm') : 'Delete this chat?')) return;
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (activeId === id) activeId = sessions.length ? sessions[0].id : null;
  renderSidebar();
  renderMessages();
}

// ── Sidebar ────────────────────────────────────────────────

function renderSidebar() {
  const list  = document.getElementById('chatHistoryList');
  const empty = document.getElementById('chatHistoryEmpty');
  list.querySelectorAll('.chat-session-item').forEach(el => el.remove());

  if (!sessions.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  sessions.forEach(s => {
    const item  = document.createElement('div');
    item.className = 'chat-session-item' + (s.id === activeId ? ' active' : '');
    item.onclick = () => setActiveSession(s.id);

    const title = document.createElement('div');
    title.className = 'chat-session-title';
    title.textContent = s.title || formatDate(s.createdAt);

    const del = document.createElement('button');
    del.className = 'chat-session-delete';
    del.innerHTML = '&times;';
    del.onclick = (e) => deleteSession(s.id, e);

    item.appendChild(title);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function formatDate(ts) {
  const diff  = Date.now() - ts;
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 1)   return 'Just now';
  if (mins < 60)  return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days < 7)   return `${days}d ago`;
  return new Date(ts).toLocaleDateString();
}

// ── Message rendering ──────────────────────────────────────

function renderMessages() {
  chatMessagesEl.querySelectorAll('.msg-row, .thinking-row').forEach(el => el.remove());
  const session = getActive();
  if (!session || !session.messages.length) { chatEmptyEl.style.display = ''; return; }
  chatEmptyEl.style.display = 'none';
  session.messages.forEach(m => appendMessageEl(m.role, m.content, m.sources || []));
}

function appendMessageEl(role, content, sources = []) {
  chatEmptyEl.style.display = 'none';
  const row    = document.createElement('div');
  row.className = 'msg-row ' + role;
  const wrap   = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'assistant') {
    bubble.innerHTML = marked.parse(content || '');
  } else {
    bubble.textContent = content || '';
  }
  wrap.appendChild(bubble);

  if (role === 'assistant' && sources.length) {
    wrap.appendChild(buildSources(sources));
  }

  row.appendChild(wrap);
  chatMessagesEl.appendChild(row);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
  return { row, bubble, wrap };
}

function buildSources(sources) {
  const src   = document.createElement('div');
  src.className = 'msg-sources';
  const title = typeof t === 'function' ? t('chat.sources') : 'Sources';
  src.innerHTML = `<details><summary>${title}</summary><ul>${
    sources.map(s => `<li>${s.filename || '—'} · ${(s.score || 0).toFixed(3)}${s.page_range ? ` · ${s.page_range}` : ''}</li>`).join('')
  }</ul></details>`;
  return src;
}

// ── Thinking indicator ─────────────────────────────────────

function showThinking() {
  chatEmptyEl.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.innerHTML = `<div class="thinking-bubble">
    <div class="thinking-dot"></div>
    <div class="thinking-dot"></div>
    <div class="thinking-dot"></div>
  </div>`;
  chatMessagesEl.appendChild(row);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
  return row;
}

// ── Send with streaming ────────────────────────────────────

async function sendChat() {
  const question = (chatInputEl.value || '').trim();
  if (!question) return;

  if (!activeId) newChat();
  const session = getActive();

  chatInputEl.value = '';
  chatInputEl.disabled = true;
  chatSendEl.disabled = true;

  const isFirstMessage = session.messages.length === 0;
  session.messages.push({ role: 'user', content: question });
  saveSessions();
  appendMessageEl('user', question);
  renderSidebar();

  const thinkingRow = showThinking();

  const historyForApi = session.messages
    .slice(0, -1)
    .map(m => ({ role: m.role, content: m.content }));

  let fullText = '';
  let sources  = [];

  try {
    const response = await _chatAuthFetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history: historyForApi }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.detail || 'Request failed');
    }

    // Remove thinking dots, create streaming bubble
    thinkingRow.remove();
    const streamRow    = document.createElement('div');
    streamRow.className = 'msg-row assistant';
    const streamWrap   = document.createElement('div');
    const streamBubble = document.createElement('div');
    streamBubble.className = 'msg-bubble';
    streamWrap.appendChild(streamBubble);
    streamRow.appendChild(streamWrap);
    chatMessagesEl.appendChild(streamRow);

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        if (event.type === 'sources') {
          sources = event.sources || [];
        } else if (event.type === 'text') {
          fullText += event.text;
          streamBubble.innerHTML = marked.parse(fullText);
          chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        } else if (event.type === 'error') {
          fullText += `\n\n*Error: ${event.message}*`;
          streamBubble.innerHTML = marked.parse(fullText);
        } else if (event.type === 'done') {
          if (sources.length) streamWrap.appendChild(buildSources(sources));
        }
      }
    }

    session.messages.push({ role: 'assistant', content: fullText, sources });
    saveSessions();

    // Generate a proper title from the first exchange
    if (isFirstMessage && fullText) {
      _chatAuthFetch('/api/chat/title', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, answer: fullText }),
      })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data?.title) {
            session.title = data.title;
            saveSessions();
            renderSidebar();
          }
        })
        .catch(() => {});
    }

  } catch (e) {
    thinkingRow.remove();
    const errText = `Error: ${e.message || 'Unknown error'}`;
    session.messages.push({ role: 'assistant', content: errText });
    saveSessions();
    appendMessageEl('assistant', errText);
  } finally {
    chatInputEl.disabled = false;
    chatSendEl.disabled = false;
    chatInputEl.focus();
  }
}

chatInputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

document.addEventListener('langchange', () => { renderSidebar(); });

// ── Init ───────────────────────────────────────────────────
loadSessions();
if (sessions.length) activeId = sessions[0].id;
renderSidebar();
renderMessages();
</script>
{% endblock %}
