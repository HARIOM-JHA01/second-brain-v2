{% extends "dashboard.html" %}

{% block extra_head %}
{{ super() }}
<style>
  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start;
  }
  @media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr; } }

  .settings-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem; transition: background .3s, border-color .3s;
  }
  .settings-card.customize-card { grid-column: 1 / -1; }
  .settings-card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: .85rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .settings-card-header h3 { font-size: .95rem; font-weight: 700; color: var(--text); }

  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: .55rem 0; border-bottom: 1px solid var(--table-border); font-size: .88rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text-muted); font-size: .82rem; }
  .info-value { color: var(--text); font-weight: 600; }

  .role-item {
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: .6rem; overflow: hidden; transition: border-color .2s;
  }
  .role-item:hover { border-color: var(--border-hover); }
  .role-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: .75rem 1rem; cursor: pointer; user-select: none;
    background: var(--table-header); transition: background .2s;
  }
  .role-header:hover { background: var(--surface-hover); }
  .role-name { font-weight: 700; font-size: .88rem; color: var(--text); }
  .role-body { display: none; padding: 1rem; border-top: 1px solid var(--border); }
  .role-body.open { display: block; }

  /* ── Clean permission list ── */
  .perm-list {
    display: flex; flex-direction: column; gap: .4rem; margin-bottom: .85rem;
  }
  .perm-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: .7rem .85rem; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: all .18s; user-select: none;
  }
  .perm-item:hover { border-color: rgba(220,38,38,.35); background: var(--surface-hover); }
  .perm-item:has(input:checked) {
    border-color: rgba(220,38,38,.4);
    background: rgba(220,38,38,.06);
  }
  .perm-item-text { flex: 1; min-width: 0; }
  .perm-item-name {
    font-size: .78rem; font-weight: 700; color: var(--text);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    margin-bottom: .18rem;
  }
  .perm-item-desc {
    font-size: .73rem; color: var(--text-muted); line-height: 1.4;
    transition: color .3s;
  }
  .perm-item input[type="checkbox"] {
    width: 16px; height: 16px; flex-shrink: 0;
    cursor: pointer; accent-color: var(--indigo);
  }

  .role-actions { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .chevron { transition: transform .2s; font-size: .7rem; color: var(--text-muted); }
  .chevron.open { transform: rotate(180deg); }
  .save-msg { font-size: .8rem; display: none; }
  .save-msg.ok { color: var(--success, #34d399); }
  .save-msg.err { color: var(--error, #f87171); }

  .customize-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
  }
  @media (max-width: 980px) {
    .customize-grid { grid-template-columns: 1fr; }
  }
  .customize-row {
    display: flex;
    flex-direction: column;
    gap: .45rem;
  }
  .customize-row label {
    color: var(--text-dim);
    font-size: .8rem;
    font-weight: 600;
  }
  .color-control {
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  .color-control input[type="color"] {
    width: 44px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    padding: 0;
    cursor: pointer;
  }
  .color-control input[type="text"],
  .customize-row select {
    width: 100%;
    padding: .62rem .75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    font-size: .85rem;
    font-family: inherit;
  }
  .color-control input[type="text"]:focus,
  .customize-row select:focus {
    border-color: var(--indigo);
  }
  .customize-save {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: .75rem;
    flex-wrap: wrap;
  }
  .customize-save .save-msg {
    display: inline;
  }
</style>
{% endblock %}

{% block dashboard_content %}
<div class="page-header">
  <h1 data-i18n="settings.title">Configuración</h1>
</div>

<div class="settings-grid">

  <!-- Account Info -->
  <div class="settings-card">
    <div class="settings-card-header">
      <h3 data-i18n="settings.account.title">Cuenta</h3>
    </div>
    <div id="accountInfo">
      <div class="info-row">
        <div class="skel-line" style="width:34%;height:11px;border-radius:5px;"></div>
        <div class="skel-line" style="width:42%;height:11px;border-radius:5px;"></div>
      </div>
      <div class="info-row">
        <div class="skel-line" style="width:28%;height:11px;border-radius:5px;"></div>
        <div class="skel-line" style="width:36%;height:11px;border-radius:5px;"></div>
      </div>
    </div>
  </div>

  <!-- Roles & Permissions -->
  <div class="settings-card">
    <div class="settings-card-header">
      <h3 data-i18n="settings.roles.title">Roles y permisos</h3>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('addRoleModal').classList.add('show')" data-i18n="settings.roles.add">+ Agregar rol</button>
    </div>
    <div id="rolesList">
      {% for _ in range(4) %}
      <div class="role-item">
        <div class="role-header">
          <div class="skel-line" style="width:30%;height:11px;border-radius:5px;"></div>
          <div class="skel-line" style="width:8%;height:11px;border-radius:5px;"></div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- Customize -->
  <div class="settings-card customize-card">
    <div class="settings-card-header">
      <h3 data-i18n="settings.customize.title">Customize</h3>
    </div>
    <div class="customize-grid">
      <div class="customize-row">
        <label for="prefPrimaryColor" data-i18n="settings.customize.primary">Primary color</label>
        <div class="color-control">
          <input type="color" id="prefPrimaryColor" />
          <input type="text" id="prefPrimaryHex" maxlength="7" placeholder="#dc2626" />
        </div>
      </div>
      <div class="customize-row">
        <label for="prefSecondaryColor" data-i18n="settings.customize.secondary">Secondary color</label>
        <div class="color-control">
          <input type="color" id="prefSecondaryColor" />
          <input type="text" id="prefSecondaryHex" maxlength="7" placeholder="#991b1b" />
        </div>
      </div>
      <div class="customize-row">
        <label for="prefTertiaryColor" data-i18n="settings.customize.tertiary">Tertiary color</label>
        <div class="color-control">
          <input type="color" id="prefTertiaryColor" />
          <input type="text" id="prefTertiaryHex" maxlength="7" placeholder="#fca5a5" />
        </div>
      </div>
      <div class="customize-row">
        <label for="prefFontFamily" data-i18n="settings.customize.font_family">Font family</label>
        <select id="prefFontFamily">
          <option value="inter">Inter</option>
          <option value="poppins">Poppins</option>
          <option value="manrope">Manrope</option>
          <option value="source_sans_3">Source Sans 3</option>
        </select>
      </div>
      <div class="customize-row">
        <label for="prefFontScale" data-i18n="settings.customize.font_scale">Font scale</label>
        <select id="prefFontScale">
          <option value="small" data-i18n="settings.customize.scale.small">Small</option>
          <option value="medium" data-i18n="settings.customize.scale.medium">Medium</option>
          <option value="large" data-i18n="settings.customize.scale.large">Large</option>
        </select>
      </div>
      <div class="customize-row">
        <label for="prefThemeMode" data-i18n="settings.customize.theme_mode">Theme mode</label>
        <select id="prefThemeMode">
          <option value="dark" data-i18n="settings.customize.theme.dark">Dark</option>
          <option value="light" data-i18n="settings.customize.theme.light">Light</option>
        </select>
      </div>
      <div class="customize-row">
        <label for="prefLanguage" data-i18n="settings.customize.language">Language</label>
        <select id="prefLanguage">
          <option value="es">ES</option>
          <option value="en">EN</option>
        </select>
      </div>
    </div>
    <div class="customize-save">
      <button class="btn btn-primary btn-sm" id="saveCustomizeBtn" data-i18n="settings.customize.save">Save customization</button>
      <span class="save-msg" id="customizeMsg"></span>
    </div>
  </div>

</div>

<!-- Add Role Modal -->
<div id="addRoleModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 data-i18n="settings.modal.title">Nuevo rol</h2>
      <button class="modal-close" onclick="document.getElementById('addRoleModal').classList.remove('show')">&times;</button>
    </div>
    <form id="addRoleForm">
      <div class="form-group">
        <label data-i18n="settings.modal.name_label">Nombre del rol</label>
        <input type="text" id="newRoleName" required data-i18n-ph="settings.modal.name_ph" placeholder="ej. Analista" />
      </div>
      <div class="form-group">
        <label data-i18n="settings.modal.perms_label">Permisos</label>
        <div class="perm-list" style="margin-top:.5rem;">

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:financial</div>
              <div class="perm-item-desc" data-i18n="perm.query:financial">Puede consultar al AI sobre datos financieros — ingresos, presupuestos, pronósticos e informes de costos.</div>
            </div>
            <input type="checkbox" id="np-query_financial">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:strategic</div>
              <div class="perm-item-desc" data-i18n="perm.query:strategic">Puede consultar documentos estratégicos — hojas de ruta, análisis competitivo y planes confidenciales.</div>
            </div>
            <input type="checkbox" id="np-query_strategic">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:sensitive</div>
              <div class="perm-item-desc" data-i18n="perm.query:sensitive">Puede acceder a información restringida como registros de RRHH, documentos legales o investigaciones internas.</div>
            </div>
            <input type="checkbox" id="np-query_sensitive">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">document:read</div>
              <div class="perm-item-desc" data-i18n="perm.document:read">Puede navegar y ver documentos almacenados en la base de conocimiento de la organización.</div>
            </div>
            <input type="checkbox" id="np-document_read">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">document:upload</div>
              <div class="perm-item-desc" data-i18n="perm.document:upload">Puede subir nuevos archivos a la base de conocimiento vía WhatsApp o el panel.</div>
            </div>
            <input type="checkbox" id="np-document_upload">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">user:manage</div>
              <div class="perm-item-desc" data-i18n="perm.user:manage">Puede agregar, editar, desactivar y asignar roles a miembros del equipo en la organización.</div>
            </div>
            <input type="checkbox" id="np-user_manage">
          </label>

        </div>
      </div>
      <button type="submit" id="createRoleBtn" class="btn btn-primary" style="width:100%;justify-content:center;" data-i18n="settings.modal.create_btn">Crear rol</button>
    </form>
  </div>
</div>

<script>
const PERM_KEYS = ['query:financial','query:strategic','query:sensitive','document:read','document:upload','user:manage'];
const permDesc = k => t('perm.' + k);

const token = localStorage.getItem('access_token');
if (!token) window.location.href = '/login';

const authFetch = (url, opts = {}) => fetch(url, {
  ...opts, headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) }
});

const HEX_RE = /^#[0-9A-Fa-f]{6}$/;
const customizeEls = {
  primaryColor: document.getElementById('prefPrimaryColor'),
  primaryHex: document.getElementById('prefPrimaryHex'),
  secondaryColor: document.getElementById('prefSecondaryColor'),
  secondaryHex: document.getElementById('prefSecondaryHex'),
  tertiaryColor: document.getElementById('prefTertiaryColor'),
  tertiaryHex: document.getElementById('prefTertiaryHex'),
  fontFamily: document.getElementById('prefFontFamily'),
  fontScale: document.getElementById('prefFontScale'),
  themeMode: document.getElementById('prefThemeMode'),
  language: document.getElementById('prefLanguage'),
  saveBtn: document.getElementById('saveCustomizeBtn'),
  msg: document.getElementById('customizeMsg'),
};

function normalizeHex(value, fallback) {
  const text = String(value || '').trim();
  if (HEX_RE.test(text)) return text.toLowerCase();
  return fallback;
}

function getCustomizePayloadFromForm() {
  const fallback = window.customizeSettings?.defaults || {};
  return {
    primary_color: normalizeHex(customizeEls.primaryHex.value, fallback.primary_color || '#dc2626'),
    secondary_color: normalizeHex(customizeEls.secondaryHex.value, fallback.secondary_color || '#991b1b'),
    tertiary_color: normalizeHex(customizeEls.tertiaryHex.value, fallback.tertiary_color || '#fca5a5'),
    font_family: customizeEls.fontFamily.value || fallback.font_family || 'inter',
    font_scale: customizeEls.fontScale.value || fallback.font_scale || 'medium',
    theme_mode: customizeEls.themeMode.value || fallback.theme_mode || 'dark',
    language: customizeEls.language.value || fallback.language || 'es',
  };
}

function setCustomizeFormValues(pref) {
  customizeEls.primaryColor.value = pref.primary_color;
  customizeEls.primaryHex.value = pref.primary_color;
  customizeEls.secondaryColor.value = pref.secondary_color;
  customizeEls.secondaryHex.value = pref.secondary_color;
  customizeEls.tertiaryColor.value = pref.tertiary_color;
  customizeEls.tertiaryHex.value = pref.tertiary_color;
  customizeEls.fontFamily.value = pref.font_family;
  customizeEls.fontScale.value = pref.font_scale;
  customizeEls.themeMode.value = pref.theme_mode;
  customizeEls.language.value = pref.language;
}

function previewCustomization() {
  const payload = getCustomizePayloadFromForm();
  if (window.customizeSettings?.applyCustomization) {
    window.customizeSettings.applyCustomization(payload, { persistCache: true });
  }
  setCustomizeFormValues(payload);
}

function bindColorPair(colorEl, hexEl) {
  colorEl.addEventListener('input', () => {
    hexEl.value = colorEl.value;
    previewCustomization();
  });
  hexEl.addEventListener('input', () => {
    if (HEX_RE.test(hexEl.value.trim())) {
      colorEl.value = hexEl.value.trim();
      previewCustomization();
    }
  });
  hexEl.addEventListener('blur', () => {
    const payload = getCustomizePayloadFromForm();
    setCustomizeFormValues(payload);
    previewCustomization();
  });
}

async function loadCustomizationForm() {
  const r = await authFetch('/api/users/customization');
  if (!r.ok) {
    throw new Error('Failed to load customization');
  }
  const pref = await r.json();
  setCustomizeFormValues(pref);
  previewCustomization();
}

async function saveCustomization() {
  const payload = getCustomizePayloadFromForm();
  customizeEls.saveBtn.disabled = true;
  customizeEls.msg.className = 'save-msg';
  customizeEls.msg.textContent = t('settings.customize.saving');

  const r = await authFetch('/api/users/customization', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  customizeEls.saveBtn.disabled = false;

  if (!r.ok) {
    const d = await r.json().catch(() => ({}));
    customizeEls.msg.className = 'save-msg err';
    customizeEls.msg.textContent = d.detail || t('settings.customize.error');
    return;
  }

  const saved = await r.json();
  setCustomizeFormValues(saved);
  if (window.customizeSettings?.applyCustomization) {
    window.customizeSettings.applyCustomization(saved, { persistCache: true });
  }
  customizeEls.msg.className = 'save-msg ok';
  customizeEls.msg.textContent = t('settings.customize.saved');
}

async function initCustomizeSettings() {
  bindColorPair(customizeEls.primaryColor, customizeEls.primaryHex);
  bindColorPair(customizeEls.secondaryColor, customizeEls.secondaryHex);
  bindColorPair(customizeEls.tertiaryColor, customizeEls.tertiaryHex);

  [customizeEls.fontFamily, customizeEls.fontScale, customizeEls.themeMode, customizeEls.language]
    .forEach(el => el.addEventListener('change', previewCustomization));

  customizeEls.saveBtn.addEventListener('click', saveCustomization);

  try {
    await loadCustomizationForm();
    customizeEls.msg.className = 'save-msg';
    customizeEls.msg.textContent = '';
  } catch (_) {
    const fallback = window.customizeSettings?.getCurrent?.() || window.customizeSettings?.defaults;
    if (fallback) setCustomizeFormValues(fallback);
    customizeEls.msg.className = 'save-msg err';
    customizeEls.msg.textContent = t('settings.customize.error');
  }
}

// Account info
(async () => {
  const r = await authFetch('/auth/me');
  const el = document.getElementById('accountInfo');
  if (!r.ok) { el.innerHTML = `<span style="color:var(--error)">${t('settings.account.error')}</span>`; return; }
  const me = await r.json();
  el.innerHTML = `
    <div class="info-row"><span class="info-label">${t('settings.account.email')}</span><span class="info-value">${me.email}</span></div>
    <div class="info-row"><span class="info-label">${t('settings.account.member_since')}</span><span class="info-value">${new Date(me.created_at).toLocaleDateString(getLang() === 'es' ? 'es-ES' : 'en-US')}</span></div>
  `;
})();

function toggleRole(id) {
  const body = document.getElementById('rb-' + id);
  const chev = document.getElementById('rc-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function rolesSkeleton() {
  return Array.from({ length: 4 }).map(() => `
    <div class="role-item">
      <div class="role-header">
        <div class="skel-line" style="width:30%;height:11px;border-radius:5px;"></div>
        <div class="skel-line" style="width:8%;height:11px;border-radius:5px;"></div>
      </div>
    </div>
  `).join('');
}

async function loadRoles() {
  const el = document.getElementById('rolesList');
  el.innerHTML = rolesSkeleton();
  const r = await authFetch('/api/roles');
  if (!r.ok) { el.innerHTML = `<span style="color:var(--error)">${t('settings.roles.error')}</span>`; return; }
  const roles = await r.json();
  if (!roles.length) { el.innerHTML = `<span style="color:var(--text-muted)">${t('settings.roles.empty')}</span>`; return; }

  el.innerHTML = roles.map(role => {
    const pm = {};
    (role.permissions || []).forEach(p => { const [k,v] = Object.entries(p)[0]; pm[k]=v; });
    const checks = PERM_KEYS.map(k => `
      <label class="perm-item">
        <div class="perm-item-text">
          <div class="perm-item-name">${k}</div>
          <div class="perm-item-desc">${permDesc(k)}</div>
        </div>
        <input type="checkbox" data-role="${role.id}" data-perm="${k}" ${pm[k] ? 'checked' : ''}>
      </label>`).join('');
    return `
      <div class="role-item">
        <div class="role-header" onclick="toggleRole('${role.id}')">
          <span class="role-name">${role.name}</span>
          <span class="chevron" id="rc-${role.id}">&#9660;</span>
        </div>
        <div class="role-body" id="rb-${role.id}">
          <div class="perm-list">${checks}</div>
          <div class="role-actions">
            <button class="btn btn-primary btn-sm" onclick="saveRole('${role.id}','${role.name}')">${t('settings.btn.save')}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRole('${role.id}','${role.name}')">${t('settings.btn.delete')}</button>
            <span class="save-msg" id="msg-${role.id}"></span>
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('addRoleForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('newRoleName').value.trim();
  if (!name) return;
  const permissions = PERM_KEYS.map(k => ({ [k]: document.getElementById('np-' + k.replace(':','_')).checked }));
  const btn = document.getElementById('createRoleBtn');
  btn.disabled = true;
  const r = await authFetch('/api/roles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, permissions, org_id: '00000000-0000-0000-0000-000000000000' })
  });
  btn.disabled = false;
  if (r.ok) {
    document.getElementById('addRoleModal').classList.remove('show');
    document.getElementById('addRoleForm').reset();
    loadRoles();
  } else {
    const d = await r.json().catch(() => ({}));
    alert(t('settings.create.error') + (d.detail || r.status));
  }
});

async function saveRole(id, name) {
  const permissions = PERM_KEYS.map(k => {
    const cb = document.querySelector(`input[data-role="${id}"][data-perm="${k}"]`);
    return { [k]: cb ? cb.checked : false };
  });
  const r = await authFetch(`/api/roles/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, permissions, org_id: '00000000-0000-0000-0000-000000000000' })
  });
  const msg = document.getElementById('msg-' + id);
  msg.className = 'save-msg ' + (r.ok ? 'ok' : 'err');
  msg.textContent = r.ok ? t('settings.msg.saved') : t('settings.msg.error');
  msg.style.display = 'inline';
  setTimeout(() => { msg.style.display = 'none'; }, 2500);
}

async function deleteRole(id, name) {
  if (!confirm(t('settings.delete.confirm', { name }))) return;
  const r = await authFetch(`/api/roles/${id}`, { method: 'DELETE' });
  if (r.ok) loadRoles();
  else alert(t('settings.delete.error'));
}

document.addEventListener('langchange', () => loadRoles());

initCustomizeSettings();
loadRoles();
</script>
{% endblock %}
