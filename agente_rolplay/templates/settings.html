{% extends "dashboard.html" %}

{% block extra_head %}
{{ super() }}
<style>
  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start;
  }
  @media (max-width: 900px) { .settings-grid { grid-template-columns: 1fr; } }

  .settings-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem; transition: background .3s, border-color .3s;
  }
  .settings-card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: .85rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .settings-card-header h3 { font-size: .95rem; font-weight: 700; color: var(--text); }

  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: .55rem 0; border-bottom: 1px solid var(--table-border); font-size: .88rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text-muted); font-size: .82rem; }
  .info-value { color: var(--text); font-weight: 600; }

  .role-item {
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: .6rem; overflow: hidden; transition: border-color .2s;
  }
  .role-item:hover { border-color: var(--border-hover); }
  .role-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: .75rem 1rem; cursor: pointer; user-select: none;
    background: var(--table-header); transition: background .2s;
  }
  .role-header:hover { background: var(--surface-hover); }
  .role-name { font-weight: 700; font-size: .88rem; color: var(--text); }
  .role-body { display: none; padding: 1rem; border-top: 1px solid var(--border); }
  .role-body.open { display: block; }

  /* ── Clean permission list ── */
  .perm-list {
    display: flex; flex-direction: column; gap: .4rem; margin-bottom: .85rem;
  }
  .perm-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: .7rem .85rem; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; transition: all .18s; user-select: none;
  }
  .perm-item:hover { border-color: rgba(220,38,38,.35); background: var(--surface-hover); }
  .perm-item:has(input:checked) {
    border-color: rgba(220,38,38,.4);
    background: rgba(220,38,38,.06);
  }
  .perm-item-text { flex: 1; min-width: 0; }
  .perm-item-name {
    font-size: .78rem; font-weight: 700; color: var(--text);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    margin-bottom: .18rem;
  }
  .perm-item-desc {
    font-size: .73rem; color: var(--text-muted); line-height: 1.4;
    transition: color .3s;
  }
  .perm-item input[type="checkbox"] {
    width: 16px; height: 16px; flex-shrink: 0;
    cursor: pointer; accent-color: var(--indigo);
  }

  .role-actions { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .chevron { transition: transform .2s; font-size: .7rem; color: var(--text-muted); }
  .chevron.open { transform: rotate(180deg); }
  .save-msg { font-size: .8rem; display: none; }
  .save-msg.ok { color: var(--success, #34d399); }
  .save-msg.err { color: var(--error, #f87171); }
</style>
{% endblock %}

{% block dashboard_content %}
<div class="page-header">
  <h1 data-i18n="settings.title">Configuración</h1>
</div>

<div class="settings-grid">

  <!-- Account Info -->
  <div class="settings-card">
    <div class="settings-card-header">
      <h3 data-i18n="settings.account.title">Cuenta</h3>
    </div>
    <div id="accountInfo"><span style="color:var(--text-muted);font-size:.88rem;" data-i18n="common.loading">Cargando…</span></div>
  </div>

  <!-- Roles & Permissions -->
  <div class="settings-card">
    <div class="settings-card-header">
      <h3 data-i18n="settings.roles.title">Roles y permisos</h3>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('addRoleModal').classList.add('show')" data-i18n="settings.roles.add">+ Agregar rol</button>
    </div>
    <div id="rolesList"><span style="color:var(--text-muted);font-size:.88rem;" data-i18n="common.loading">Cargando…</span></div>
  </div>

</div>

<!-- Add Role Modal -->
<div id="addRoleModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 data-i18n="settings.modal.title">Nuevo rol</h2>
      <button class="modal-close" onclick="document.getElementById('addRoleModal').classList.remove('show')">&times;</button>
    </div>
    <form id="addRoleForm">
      <div class="form-group">
        <label data-i18n="settings.modal.name_label">Nombre del rol</label>
        <input type="text" id="newRoleName" required data-i18n-ph="settings.modal.name_ph" placeholder="ej. Analista" />
      </div>
      <div class="form-group">
        <label data-i18n="settings.modal.perms_label">Permisos</label>
        <div class="perm-list" style="margin-top:.5rem;">

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:financial</div>
              <div class="perm-item-desc" data-i18n="perm.query:financial">Puede consultar al AI sobre datos financieros — ingresos, presupuestos, pronósticos e informes de costos.</div>
            </div>
            <input type="checkbox" id="np-query_financial">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:strategic</div>
              <div class="perm-item-desc" data-i18n="perm.query:strategic">Puede consultar documentos estratégicos — hojas de ruta, análisis competitivo y planes confidenciales.</div>
            </div>
            <input type="checkbox" id="np-query_strategic">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">query:sensitive</div>
              <div class="perm-item-desc" data-i18n="perm.query:sensitive">Puede acceder a información restringida como registros de RRHH, documentos legales o investigaciones internas.</div>
            </div>
            <input type="checkbox" id="np-query_sensitive">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">document:read</div>
              <div class="perm-item-desc" data-i18n="perm.document:read">Puede navegar y ver documentos almacenados en la base de conocimiento de la organización.</div>
            </div>
            <input type="checkbox" id="np-document_read">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">document:upload</div>
              <div class="perm-item-desc" data-i18n="perm.document:upload">Puede subir nuevos archivos a la base de conocimiento vía WhatsApp o el panel.</div>
            </div>
            <input type="checkbox" id="np-document_upload">
          </label>

          <label class="perm-item">
            <div class="perm-item-text">
              <div class="perm-item-name">user:manage</div>
              <div class="perm-item-desc" data-i18n="perm.user:manage">Puede agregar, editar, desactivar y asignar roles a miembros del equipo en la organización.</div>
            </div>
            <input type="checkbox" id="np-user_manage">
          </label>

        </div>
      </div>
      <button type="submit" id="createRoleBtn" class="btn btn-primary" style="width:100%;justify-content:center;" data-i18n="settings.modal.create_btn">Crear rol</button>
    </form>
  </div>
</div>

<script>
const PERM_KEYS = ['query:financial','query:strategic','query:sensitive','document:read','document:upload','user:manage'];
const permDesc = k => t('perm.' + k);

const token = localStorage.getItem('access_token');
if (!token) window.location.href = '/login';

const authFetch = (url, opts = {}) => fetch(url, {
  ...opts, headers: { 'Authorization': 'Bearer ' + token, ...(opts.headers || {}) }
});

// Account info
(async () => {
  const r = await authFetch('/auth/me');
  const el = document.getElementById('accountInfo');
  if (!r.ok) { el.innerHTML = `<span style="color:var(--error)">${t('settings.account.error')}</span>`; return; }
  const me = await r.json();
  el.innerHTML = `
    <div class="info-row"><span class="info-label">${t('settings.account.email')}</span><span class="info-value">${me.email}</span></div>
    <div class="info-row"><span class="info-label">${t('settings.account.member_since')}</span><span class="info-value">${new Date(me.created_at).toLocaleDateString(getLang() === 'es' ? 'es-ES' : 'en-US')}</span></div>
  `;
})();

function toggleRole(id) {
  const body = document.getElementById('rb-' + id);
  const chev = document.getElementById('rc-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

async function loadRoles() {
  const el = document.getElementById('rolesList');
  el.innerHTML = `<span style="color:var(--text-muted);font-size:.88rem;">${t('settings.roles.loading')}</span>`;
  const r = await authFetch('/api/roles');
  if (!r.ok) { el.innerHTML = `<span style="color:var(--error)">${t('settings.roles.error')}</span>`; return; }
  const roles = await r.json();
  if (!roles.length) { el.innerHTML = `<span style="color:var(--text-muted)">${t('settings.roles.empty')}</span>`; return; }

  el.innerHTML = roles.map(role => {
    const pm = {};
    (role.permissions || []).forEach(p => { const [k,v] = Object.entries(p)[0]; pm[k]=v; });
    const checks = PERM_KEYS.map(k => `
      <label class="perm-item">
        <div class="perm-item-text">
          <div class="perm-item-name">${k}</div>
          <div class="perm-item-desc">${permDesc(k)}</div>
        </div>
        <input type="checkbox" data-role="${role.id}" data-perm="${k}" ${pm[k] ? 'checked' : ''}>
      </label>`).join('');
    return `
      <div class="role-item">
        <div class="role-header" onclick="toggleRole('${role.id}')">
          <span class="role-name">${role.name}</span>
          <span class="chevron" id="rc-${role.id}">&#9660;</span>
        </div>
        <div class="role-body" id="rb-${role.id}">
          <div class="perm-list">${checks}</div>
          <div class="role-actions">
            <button class="btn btn-primary btn-sm" onclick="saveRole('${role.id}','${role.name}')">${t('settings.btn.save')}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRole('${role.id}','${role.name}')">${t('settings.btn.delete')}</button>
            <span class="save-msg" id="msg-${role.id}"></span>
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('addRoleForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('newRoleName').value.trim();
  if (!name) return;
  const permissions = PERM_KEYS.map(k => ({ [k]: document.getElementById('np-' + k.replace(':','_')).checked }));
  const btn = document.getElementById('createRoleBtn');
  btn.disabled = true;
  const r = await authFetch('/api/roles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, permissions, org_id: '00000000-0000-0000-0000-000000000000' })
  });
  btn.disabled = false;
  if (r.ok) {
    document.getElementById('addRoleModal').classList.remove('show');
    document.getElementById('addRoleForm').reset();
    loadRoles();
  } else {
    const d = await r.json().catch(() => ({}));
    alert(t('settings.create.error') + (d.detail || r.status));
  }
});

async function saveRole(id, name) {
  const permissions = PERM_KEYS.map(k => {
    const cb = document.querySelector(`input[data-role="${id}"][data-perm="${k}"]`);
    return { [k]: cb ? cb.checked : false };
  });
  const r = await authFetch(`/api/roles/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, permissions, org_id: '00000000-0000-0000-0000-000000000000' })
  });
  const msg = document.getElementById('msg-' + id);
  msg.className = 'save-msg ' + (r.ok ? 'ok' : 'err');
  msg.textContent = r.ok ? t('settings.msg.saved') : t('settings.msg.error');
  msg.style.display = 'inline';
  setTimeout(() => { msg.style.display = 'none'; }, 2500);
}

async function deleteRole(id, name) {
  if (!confirm(t('settings.delete.confirm', { name }))) return;
  const r = await authFetch(`/api/roles/${id}`, { method: 'DELETE' });
  if (r.ok) loadRoles();
  else alert(t('settings.delete.error'));
}

document.addEventListener('langchange', () => loadRoles());

loadRoles();
</script>
{% endblock %}
