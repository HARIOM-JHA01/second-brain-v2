<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Second Brain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="/static/theme.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root, [data-theme="dark"] {
        --bg: #07070f;
        --surface: rgba(255,255,255,.04);
        --border: rgba(255,255,255,.08);
        --border-focus: #dc2626;
        --text: #ffffff;
        --text-dim: rgba(255,255,255,.65);
        --text-muted: rgba(255,255,255,.4);
        --input-bg: rgba(255,255,255,.05);
        --input-color: #fff;
        --placeholder: rgba(255,255,255,.28);
        --grad1: rgba(220,38,38,.16);
        --grad2: rgba(153,27,27,.14);
        --error: #f87171;
        --divider: rgba(255,255,255,.07);
        --toggle-bg: rgba(255,255,255,.08);
        --section-label: rgba(255,255,255,.35);
      }
      [data-theme="light"] {
        --bg: #f5f5fb;
        --surface: rgba(255,255,255,.9);
        --border: rgba(0,0,0,.1);
        --border-focus: #dc2626;
        --text: #0d0d18;
        --text-dim: rgba(0,0,0,.65);
        --text-muted: rgba(0,0,0,.42);
        --input-bg: rgba(0,0,0,.03);
        --input-color: #0d0d18;
        --placeholder: rgba(0,0,0,.28);
        --grad1: rgba(220,38,38,.09);
        --grad2: rgba(153,27,27,.07);
        --error: #dc2626;
        --divider: rgba(0,0,0,.08);
        --toggle-bg: rgba(0,0,0,.07);
        --section-label: rgba(0,0,0,.35);
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg); color: var(--text);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 2rem 1rem;
        transition: background .3s, color .3s;
      }
      .bg-scene {
        position: fixed; inset: 0; z-index: -1; pointer-events: none;
        background:
          radial-gradient(ellipse 70% 60% at 20% 10%, var(--grad1) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 80% 90%, var(--grad2) 0%, transparent 60%),
          var(--bg);
        transition: background .3s;
      }

      .theme-toggle {
        position: fixed; top: 1.25rem; right: 1.5rem;
        width: 36px; height: 36px; border-radius: 9px;
        background: var(--toggle-bg); border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 1rem; transition: all .2s;
      }
      .theme-toggle:hover { background: var(--surface); }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%; max-width: 480px;
        box-shadow: 0 20px 60px rgba(0,0,0,.2);
        transition: background .3s, border-color .3s;
      }

      .brand {
        display: flex; align-items: center; gap: .75rem; justify-content: center;
        margin-bottom: 1.75rem; text-decoration: none;
      }
      .brand-logo img { height: 44px; max-width: 140px; object-fit: contain; display: block; }
      .brand-divider { width: 1px; height: 22px; background: var(--border); }
      .brand-name {
        display: flex; align-items: center; gap: .35rem;
        text-decoration: none; opacity: .7; transition: opacity .2s;
      }
      .brand-name:hover { opacity: 1; }
      .brand-name img { height: 26px; object-fit: contain; display: block; }
      .brand-by { font-size: .62rem; font-weight: 500; color: var(--text-muted); letter-spacing: .3px; }

      h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: .35rem; color: var(--text); }
      .subtitle { color: var(--text-muted); font-size: .88rem; margin-bottom: 1.75rem; }

      .section-divider {
        display: flex; align-items: center; gap: .75rem;
        margin: 1.5rem 0 1rem;
        font-size: .72rem; font-weight: 600; text-transform: uppercase;
        letter-spacing: .8px; color: var(--section-label);
      }
      .section-divider::before, .section-divider::after {
        content: ''; flex: 1; height: 1px; background: var(--divider);
      }

      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
      .form-group { margin-bottom: .95rem; }
      label { display: block; color: var(--text-dim); font-size: .82rem; font-weight: 600; margin-bottom: .4rem; }
      .required { color: #818cf8; margin-left: .2rem; }

      .input-wrap { position: relative; }
      .input-wrap input { padding-right: 2.75rem; }
      .pwd-toggle {
        position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
        background: none; border: none; padding: 0;
        cursor: pointer; color: var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        transition: color .2s;
      }
      .pwd-toggle:hover { color: var(--text-dim); }
      .pwd-toggle svg { width: 18px; height: 18px; pointer-events: none; }

      input, select {
        width: 100%; padding: .75rem 1rem;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 10px; color: var(--input-color);
        font-size: .92rem; font-family: inherit; outline: none;
        transition: border-color .2s, background .3s;
        appearance: none;
      }
      input::placeholder { color: var(--placeholder); }
      input:focus, select:focus { border-color: var(--border-focus); }
      select option { background: #1a1a2e; color: #fff; }

      .btn {
        width: 100%; padding: .875rem;
        background: linear-gradient(135deg, #dc2626, #991b1b);
        border: none; border-radius: 10px;
        color: #fff; font-size: .95rem; font-weight: 700;
        font-family: inherit; cursor: pointer;
        transition: all .2s; margin-top: .75rem;
        box-shadow: 0 4px 15px rgba(220,38,38,.35);
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220,38,38,.5); }
      .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

      .error-msg { color: var(--error); font-size: .85rem; margin-top: .75rem; display: none; }
      .footer-link { text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: .88rem; }
      .footer-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
      .footer-link a:hover { text-decoration: underline; }

      @media (max-width: 480px) {
        .form-row { grid-template-columns: 1fr; }
        .card { padding: 1.75rem 1.25rem; }
      }
    </style>
  </head>
  <body>
    <div class="bg-scene"></div>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

    <div class="card">
      <a href="/" class="brand">
        <div class="brand-logo"><img src="/static/second-brain-logo.png" alt="Second Brain" /></div>
        <span class="brand-divider"></span>
        <a href="https://www.rolplay.ai/" class="brand-name" target="_blank" rel="noopener noreferrer">
          <span class="brand-by">by</span>
          <img src="/static/rolplay-logo.png" alt="Rolplay" />
        </a>
      </a>

      <h2>Create your account</h2>
      <p class="subtitle">All fields are required to get started</p>

      <form id="signupForm">

        <div class="section-divider">Your details</div>

        <div class="form-row">
          <div class="form-group">
            <label for="full_name">Full Name<span class="required">*</span></label>
            <input type="text" id="full_name" name="full_name" required placeholder="Jane Smith" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="job_title">Job Title<span class="required">*</span></label>
            <input type="text" id="job_title" name="job_title" required placeholder="CEO" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email<span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="you@company.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="whatsapp_number">WhatsApp Number<span class="required">*</span></label>
            <input type="tel" id="whatsapp_number" name="whatsapp_number" required placeholder="+1234567890" autocomplete="tel" />
          </div>
        </div>

        <div class="section-divider">Organisation</div>

        <div class="form-group">
          <label for="organization_name">Organisation Name<span class="required">*</span></label>
          <input type="text" id="organization_name" name="organization_name" required placeholder="Acme Inc." autocomplete="organization" />
        </div>

        <div class="section-divider">Security</div>

        <div class="form-group">
          <label for="password">Password<span class="required">*</span></label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" required placeholder="Min 6 characters" minlength="6" autocomplete="new-password" />
            <button type="button" class="pwd-toggle" onclick="togglePwd('password', this)" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn" id="submitBtn">Create Account</button>
      </form>

      <div class="error-msg" id="errorMessage"></div>

      <div class="footer-link">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>

    <script>
      function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const svg = btn.querySelector('svg');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        svg.innerHTML = isHidden
          ? '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
          : '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }

      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMessage');
        btn.disabled = true;
        btn.textContent = 'Creating account…';
        err.style.display = 'none';

        try {
          const res = await fetch('/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              full_name: document.getElementById('full_name').value.trim(),
              job_title: document.getElementById('job_title').value.trim(),
              email: document.getElementById('email').value.trim(),
              whatsapp_number: document.getElementById('whatsapp_number').value.trim(),
              organization_name: document.getElementById('organization_name').value.trim(),
              password: document.getElementById('password').value,
            })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
          } else {
            const detail = data.detail;
            err.textContent = Array.isArray(detail)
              ? detail.map(d => d.msg).join(', ')
              : (detail || 'Signup failed');
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create Account';
          }
        } catch (_) {
          err.textContent = 'An error occurred. Please try again.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
    </script>
  </body>
</html>
