<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Second Brain{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="/static/theme.js"></script>
    <script src="/static/i18n.js?v=12"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root, [data-theme="dark"] {
        --app-font-family: 'Inter', -apple-system, sans-serif;
        --bg: #07070f;
        --bg-alt: rgba(255,255,255,.012);
        --surface: rgba(255,255,255,.04);
        --surface-hover: rgba(255,255,255,.07);
        --border: rgba(255,255,255,.07);
        --border-hover: rgba(220,38,38,.3);
        --text: #ffffff;
        --text-dim: rgba(255,255,255,.65);
        --text-muted: rgba(255,255,255,.4);
        --indigo: #dc2626;
        --violet: #991b1b;
        --accent-tertiary: #fca5a5;
        --navbar-bg: rgba(7,7,15,.8);
        --sidebar-bg: rgba(255,255,255,.02);
        --sidebar-active: rgba(220,38,38,.15);
        --sidebar-active-border: #dc2626;
        --input-bg: rgba(255,255,255,.05);
        --input-color: #fff;
        --placeholder: rgba(255,255,255,.28);
        --card-bg: rgba(255,255,255,.03);
        --card-bg-solid: #0e0e1a;
        --table-header: rgba(255,255,255,.04);
        --table-row-hover: rgba(255,255,255,.03);
        --table-border: rgba(255,255,255,.05);
        --modal-bg: #12121e;
        --modal-overlay: rgba(0,0,0,.7);
        --badge-active-bg: rgba(74,222,128,.1);
        --badge-active-color: #4ade80;
        --badge-inactive-bg: rgba(248,113,113,.1);
        --badge-inactive-color: #f87171;
        --toggle-bg: rgba(255,255,255,.08);
        --error: #f87171;
        --success: #4ade80;
        --shadow: 0 4px 24px rgba(0,0,0,.4);
      }
      [data-theme="light"] {
        --app-font-family: 'Inter', -apple-system, sans-serif;
        --bg: #f5f5fb;
        --bg-alt: rgba(0,0,0,.02);
        --surface: rgba(255,255,255,.85);
        --surface-hover: rgba(255,255,255,1);
        --border: rgba(0,0,0,.08);
        --border-hover: rgba(220,38,38,.35);
        --text: #0d0d18;
        --text-dim: rgba(0,0,0,.65);
        --text-muted: rgba(0,0,0,.42);
        --indigo: #dc2626;
        --violet: #991b1b;
        --accent-tertiary: #fca5a5;
        --navbar-bg: rgba(245,245,251,.88);
        --sidebar-bg: rgba(255,255,255,.6);
        --sidebar-active: rgba(220,38,38,.1);
        --sidebar-active-border: #dc2626;
        --input-bg: rgba(0,0,0,.03);
        --input-color: #0d0d18;
        --placeholder: rgba(0,0,0,.28);
        --card-bg: rgba(255,255,255,.8);
        --card-bg-solid: #ffffff;
        --table-header: rgba(0,0,0,.03);
        --table-row-hover: rgba(220,38,38,.03);
        --table-border: rgba(0,0,0,.06);
        --modal-bg: #ffffff;
        --modal-overlay: rgba(0,0,0,.4);
        --badge-active-bg: rgba(22,163,74,.1);
        --badge-active-color: #16a34a;
        --badge-inactive-bg: rgba(220,38,38,.1);
        --badge-inactive-color: #dc2626;
        --toggle-bg: rgba(0,0,0,.07);
        --error: #dc2626;
        --success: #16a34a;
        --shadow: 0 4px 24px rgba(0,0,0,.1);
      }

      [data-theme="dark"] img[src*="rolplay-logo"] {
        filter: invert(1) hue-rotate(180deg);
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--app-font-family);
        background: var(--bg); color: var(--text);
        min-height: 100vh; transition: background .3s, color .3s;
      }

      /* ── Navbar ─────────────────────────────────── */
      .navbar {
        display: flex; justify-content: space-between; align-items: center;
        padding: .9rem 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--navbar-bg);
        backdrop-filter: blur(20px);
        position: sticky; top: 0; z-index: 200;
        transition: background .3s, border-color .3s;
      }
      .navbar-brand-group { display: flex; align-items: center; gap: 0; }
      .navbar-brand-main { display: flex; align-items: center; text-decoration: none; }
      .navbar-brand-main img { height: 44px; max-width: 140px; object-fit: contain; object-position: center; display: block; }
      .brand-divider { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; margin-right: .75rem; }
      .navbar-brand-parent {
        display: flex; align-items: center; gap: .4rem;
        text-decoration: none; opacity: .75; transition: opacity .2s;
      }
      .navbar-brand-parent:hover { opacity: 1; }
      .navbar-brand-parent img { height: 28px; object-fit: contain; display: block; }
      .brand-by { font-size: .65rem; font-weight: 500; color: var(--text-muted); letter-spacing: .3px; }

      .navbar-right { display: flex; align-items: center; gap: .75rem; }
      .navbar-right a {
        color: var(--text-dim); text-decoration: none; font-size: .85rem;
        padding: .4rem .75rem; border-radius: 7px; transition: all .2s;
      }
      .navbar-right a:hover { background: var(--surface-hover); color: var(--text); }

      .theme-toggle {
        width: 32px; height: 32px; border-radius: 8px;
        background: var(--toggle-bg); border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: .9rem; transition: all .2s;
      }
      .theme-toggle:hover { background: var(--surface-hover); }

      .lang-radio {
        display: flex; align-items: center;
        background: var(--toggle-bg); border: 1px solid var(--border);
        border-radius: 8px; padding: 2px; gap: 1px;
      }
      .lang-opt {
        padding: 0 .5rem; height: 26px; border-radius: 6px;
        border: none; background: transparent; cursor: pointer;
        font-size: .7rem; font-weight: 700; color: var(--text-muted);
        letter-spacing: .4px; transition: all .18s; line-height: 1;
      }
      .lang-opt.active { background: var(--indigo); color: #fff; }
      .lang-opt:not(.active):hover { background: var(--surface-hover); color: var(--text); }

      /* ── Shared form / button / modal components ─ */
      .btn {
        padding: .55rem 1.1rem; border-radius: 8px; font-weight: 600;
        font-size: .85rem; cursor: pointer; border: none; font-family: inherit;
        text-decoration: none; display: inline-flex; align-items: center; gap: .4rem;
        transition: all .2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--indigo), var(--violet));
        color: #fff; box-shadow: 0 3px 12px rgba(220,38,38,.3);
      }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(220,38,38,.45); }
      .btn-secondary {
        background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
      }
      .btn-secondary:hover { background: var(--surface-hover); color: var(--text); }
      .btn-danger { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.2); color: #f87171; }
      .btn-danger:hover { background: rgba(248,113,113,.2); }
      .btn-success { background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.2); color: #4ade80; }
      .btn-success:hover { background: rgba(74,222,128,.2); }
      .btn-sm { padding: .35rem .75rem; font-size: .8rem; border-radius: 6px; }
      .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

      .form-group { margin-bottom: 1rem; }
      .form-group label {
        display: block; font-size: .82rem; font-weight: 600;
        color: var(--text-dim); margin-bottom: .4rem; transition: color .3s;
      }
      .form-group input, .form-group select, .form-group textarea {
        width: 100%; padding: .7rem .9rem;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 8px; color: var(--input-color);
        font-size: .9rem; font-family: inherit; outline: none;
        transition: border-color .2s, background .3s;
      }
      .form-group input::placeholder, .form-group textarea::placeholder { color: var(--placeholder); }
      .form-group input:focus, .form-group select:focus { border-color: var(--indigo); }
      .form-group select option { background: #1a1a2e; }

      .modal {
        display: none; position: fixed; inset: 0;
        background: var(--modal-overlay); z-index: 1000;
        align-items: center; justify-content: center; padding: 1rem;
      }
      .modal.show { display: flex; }
      .modal-content {
        background: var(--modal-bg); border: 1px solid var(--border);
        border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px;
        box-shadow: var(--shadow); transition: background .3s, border-color .3s;
        max-height: 90vh; overflow-y: auto;
      }
      .modal-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 1.5rem;
      }
      .modal-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
      .modal-close {
        background: none; border: none; cursor: pointer;
        color: var(--text-muted); font-size: 1.4rem; line-height: 1;
        padding: .25rem; transition: color .2s;
      }
      .modal-close:hover { color: var(--text); }

      .badge {
        display: inline-flex; align-items: center; gap: .3rem;
        padding: .25rem .65rem; border-radius: 99px; font-size: .75rem; font-weight: 600;
      }
      .badge-active { background: var(--badge-active-bg); color: var(--badge-active-color); }
      .badge-inactive { background: var(--badge-inactive-bg); color: var(--badge-inactive-color); }

      .alert {
        padding: .75rem 1rem; border-radius: 8px; font-size: .85rem; margin-bottom: 1rem;
      }
      .alert-error { background: rgba(248,113,113,.1); color: var(--error); border: 1px solid rgba(248,113,113,.2); }
      .alert-success { background: rgba(74,222,128,.1); color: var(--success); border: 1px solid rgba(74,222,128,.2); }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand-group">
        <a href="/dashboard" class="navbar-brand-main">
          <img src="/static/second-brain-logo.png" alt="Second Brain" />
        </a>
        <span class="brand-divider"></span>
        <a href="https://www.rolplay.ai/" class="navbar-brand-parent" target="_blank" rel="noopener noreferrer">
          <span class="brand-by" data-i18n="nav.by">por</span>
          <img src="/static/rolplay-logo.png" alt="Rolplay" />
        </a>
      </div>
      <div class="navbar-right">
        <div class="lang-radio">
          <button class="lang-opt active" id="langES" onclick="setLang('es')">ES</button>
          <button class="lang-opt" id="langEN" onclick="setLang('en')">EN</button>
        </div>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
        {% if request.session.get('user_id') %}
        <a href="/auth/logout" data-i18n="nav.logout">Cerrar sesión</a>
        {% else %}
        <a href="/login" data-i18n="nav.login">Iniciar sesión</a>
        <a href="/signup" data-i18n="nav.signup">Registrarse</a>
        {% endif %}
      </div>
    </nav>

    {% block content %}{% endblock %}

    {% if request.session.get('user_id') %}
    <!-- ── Dashboard Assistant Bubble ──────────────────────── -->
    <style>
      #dashBubble {
        position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9000;
        width: 52px; height: 52px; border-radius: 50%;
        background: var(--indigo); color: #fff;
        border: none; cursor: pointer; font-size: 1.35rem;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 20px rgba(220,38,38,.35);
        transition: transform .2s, box-shadow .2s;
      }
      #dashBubble:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(220,38,38,.5); }
      #dashBubble .bubble-icon { transition: opacity .15s; }
      #dashBubble.open .bubble-icon-chat { opacity: 0; position: absolute; }
      #dashBubble:not(.open) .bubble-icon-close { opacity: 0; position: absolute; }

      #dashWindow {
        position: fixed; bottom: 5rem; right: 1.5rem; z-index: 8999;
        width: 360px; max-height: 520px;
        background: var(--card-bg-solid); border: 1px solid var(--border);
        border-radius: 16px; box-shadow: 0 16px 60px rgba(0,0,0,.45);
        display: flex; flex-direction: column; overflow: hidden;
        transform: scale(.92) translateY(12px); opacity: 0;
        pointer-events: none;
        transition: transform .22s cubic-bezier(.34,1.56,.64,1), opacity .18s;
      }
      #dashWindow.open {
        transform: scale(1) translateY(0); opacity: 1; pointer-events: auto;
      }

      .dash-header {
        display: flex; align-items: center; gap: .6rem;
        padding: .85rem 1rem; border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .dash-header-icon {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--sidebar-active); color: var(--indigo);
        display: flex; align-items: center; justify-content: center;
        font-size: .9rem; flex-shrink: 0;
      }
      .dash-header-text { flex: 1; }
      .dash-header-title { font-size: .85rem; font-weight: 700; color: var(--text); line-height: 1; }
      .dash-header-sub { font-size: .68rem; color: var(--text-muted); margin-top: .15rem; }
      .dash-clear {
        background: none; border: none; color: var(--text-muted);
        cursor: pointer; font-size: .72rem; padding: .25rem .5rem;
        border-radius: 6px; transition: color .15s, background .15s;
      }
      .dash-clear:hover { color: var(--text); background: var(--surface-hover); }

      #dashMessages {
        flex: 1; overflow-y: auto; padding: .85rem; display: flex; flex-direction: column; gap: .6rem;
        scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      }
      #dashMessages::-webkit-scrollbar { width: 4px; }
      #dashMessages::-webkit-scrollbar-track { background: transparent; }
      #dashMessages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .dash-msg {
        max-width: 88%; padding: .6rem .85rem; border-radius: 12px;
        font-size: .82rem; line-height: 1.5; word-break: break-word;
      }
      .dash-msg.user {
        align-self: flex-end;
        background: var(--indigo); color: #fff;
        border-bottom-right-radius: 4px;
      }
      .dash-msg.assistant {
        align-self: flex-start;
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border); border-bottom-left-radius: 4px;
      }
      .dash-msg.assistant.error { border-color: rgba(248,113,113,.3); color: var(--error); }

      .dash-typing { align-self: flex-start; display: flex; align-items: center; gap: 4px; padding: .55rem .75rem; }
      .dash-typing span {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--text-muted); display: block;
        animation: dash-type .9s infinite ease-in-out both;
      }
      .dash-typing span:nth-child(2) { animation-delay: .15s; }
      .dash-typing span:nth-child(3) { animation-delay: .3s; }
      @keyframes dash-type { 0%,80%,100% { transform: scale(.7); opacity:.4; } 40% { transform: scale(1); opacity:1; } }

      .dash-suggestions {
        display: flex; flex-wrap: wrap; gap: .35rem; padding: 0 .85rem .5rem;
      }
      .dash-chip {
        background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
        color: var(--text-dim); font-size: .72rem; padding: .28rem .65rem;
        cursor: pointer; transition: all .15s;
      }
      .dash-chip:hover { border-color: var(--indigo); color: var(--indigo); background: var(--sidebar-active); }

      .dash-input {
        display: flex; gap: .5rem; padding: .75rem;
        border-top: 1px solid var(--border); flex-shrink: 0;
      }
      #dashInput {
        flex: 1; padding: .55rem .8rem;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 10px; color: var(--input-color); font-size: .82rem;
        font-family: inherit; outline: none; resize: none;
        max-height: 80px; transition: border-color .2s;
      }
      #dashInput:focus { border-color: var(--indigo); }
      #dashInput::placeholder { color: var(--placeholder); }
      #dashSend {
        width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
        background: var(--indigo); border: none; color: #fff;
        cursor: pointer; font-size: .9rem; display: flex; align-items: center;
        justify-content: center; transition: background .15s; align-self: flex-end;
      }
      #dashSend:hover { opacity: .85; }
      #dashSend:disabled { opacity: .5; cursor: not-allowed; }

      @media (max-width: 480px) {
        #dashWindow { width: calc(100vw - 2rem); right: 1rem; }
        #dashBubble { right: 1rem; bottom: 1rem; }
      }
    </style>

    <button id="dashBubble" onclick="toggleDash()" title="Dashboard Assistant" aria-label="Open dashboard assistant">
      <span class="bubble-icon bubble-icon-chat" style="position:relative;">💡</span>
      <span class="bubble-icon bubble-icon-close" style="position:relative;">✕</span>
    </button>

    <div id="dashWindow" role="dialog" aria-label="Dashboard Assistant">
      <div class="dash-header">
        <div class="dash-header-icon">💡</div>
        <div class="dash-header-text">
          <div class="dash-header-title">Second Brain Assistant</div>
          <div class="dash-header-sub" id="dashPageLabel">Read-only · live data</div>
        </div>
        <button class="dash-clear" onclick="clearDash()" title="Clear chat">Clear</button>
      </div>
      <div id="dashMessages"></div>
      <div class="dash-suggestions" id="dashSuggestions">
        <button class="dash-chip" onclick="askDash(this)">How many active users?</button>
        <button class="dash-chip" onclick="askDash(this)">Messages last 7 days?</button>
        <button class="dash-chip" onclick="askDash(this)">Docs uploaded recently?</button>
        <button class="dash-chip" onclick="askDash(this)">Message types breakdown?</button>
        <button class="dash-chip" onclick="askDash(this)">How do I upload a document?</button>
      </div>
      <div class="dash-input">
        <textarea id="dashInput" rows="1" placeholder="Ask about analytics or the platform…" onkeydown="dashKeydown(event)" oninput="dashGrow(this)"></textarea>
        <button id="dashSend" onclick="sendDash()" title="Send">➤</button>
      </div>
    </div>

    <script>
      (function initDash() {
        const label = document.getElementById('dashPageLabel');
        if (label) {
          const path = window.location.pathname;
          const names = {
            '/dashboard': 'Dashboard',
            '/dashboard/users': 'Users',
            '/dashboard/documents': 'Documents',
            '/dashboard/chat': 'KB Chat',
            '/dashboard/settings': 'Settings',
            '/dashboard/scenarios': 'Scenarios',
            '/dashboard/insights': 'Insights',
            '/dashboard/groups': 'Groups',
            '/dashboard/broadcasts': 'Broadcasts',
          };
          const name = names[path] || 'Dashboard';
          label.textContent = `${name} · read-only · live data`;
        }
      })();

      let _dashHistory = [];
      let _dashOpen = false;
      let _dashBusy = false;

      function toggleDash() {
        _dashOpen = !_dashOpen;
        document.getElementById('dashWindow').classList.toggle('open', _dashOpen);
        document.getElementById('dashBubble').classList.toggle('open', _dashOpen);
        if (_dashOpen) {
          const input = document.getElementById('dashInput');
          if (input) setTimeout(() => input.focus(), 220);
          if (_dashHistory.length === 0) _dashWelcome();
        }
      }

      function _dashWelcome() {
        _dashAppend('assistant', 'Hi! I\'m your read-only Dashboard Assistant. Ask me about your organization\'s metrics, analytics, or how to navigate the platform.');
      }

      function clearDash() {
        _dashHistory = [];
        document.getElementById('dashMessages').innerHTML = '';
        _dashWelcome();
        document.getElementById('dashSuggestions').style.display = 'flex';
      }

      function askDash(btn) {
        const text = btn.textContent.trim();
        document.getElementById('dashSuggestions').style.display = 'none';
        document.getElementById('dashInput').value = text;
        sendDash();
      }

      function dashKeydown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDash(); }
      }

      function dashGrow(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 80) + 'px';
      }

      function _dashAppend(role, text) {
        const wrap = document.getElementById('dashMessages');
        const el = document.createElement('div');
        el.className = `dash-msg ${role}`;
        el.textContent = text;
        wrap.appendChild(el);
        wrap.scrollTop = wrap.scrollHeight;
        return el;
      }

      function _dashTyping() {
        const wrap = document.getElementById('dashMessages');
        const el = document.createElement('div');
        el.className = 'dash-msg assistant dash-typing';
        el.id = '_dashTyping';
        el.innerHTML = '<span></span><span></span><span></span>';
        wrap.appendChild(el);
        wrap.scrollTop = wrap.scrollHeight;
      }

      function _dashRemoveTyping() {
        const el = document.getElementById('_dashTyping');
        if (el) el.remove();
      }

      async function sendDash() {
        if (_dashBusy) return;
        const input = document.getElementById('dashInput');
        const text = (input.value || '').trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        document.getElementById('dashSuggestions').style.display = 'none';
        document.getElementById('dashSend').disabled = true;
        _dashBusy = true;

        _dashAppend('user', text);
        _dashTyping();

        try {
          const token = localStorage.getItem('sb-token');
          const res = await fetch('/api/users/assistant/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
            },
            body: JSON.stringify({
              message: text,
              page: window.location.pathname,
              history: _dashHistory.slice(-10),
            }),
          });
          _dashRemoveTyping();
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            const el = _dashAppend('assistant', '⚠ ' + (err.detail || 'Request failed. Please try again.'));
            el.classList.add('error');
          } else {
            const data = await res.json();
            const reply = data.reply || '(no response)';
            _dashHistory.push({ role: 'user', content: text });
            _dashHistory.push({ role: 'assistant', content: reply });
            _dashAppend('assistant', reply);
          }
        } catch (e) {
          _dashRemoveTyping();
          const el = _dashAppend('assistant', '⚠ Network error. Please check your connection.');
          el.classList.add('error');
        }

        _dashBusy = false;
        document.getElementById('dashSend').disabled = false;
        document.getElementById('dashInput').focus();
      }
    </script>
    {% endif %}
  </body>
</html>
