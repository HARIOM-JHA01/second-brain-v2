<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Second Brain{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
      }
      .navbar {
        background: #1a1a2e;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar-brand {
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        text-decoration: none;
      }
      .navbar-links {
        display: flex;
        gap: 1rem;
      }
      .navbar-links a {
        color: white;
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .navbar-links a:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary {
        background: #4361ee;
        color: white;
      }
      .btn-primary:hover {
        background: #3451db;
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #4361ee;
      }
      .alert {
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1rem;
      }
      .alert-error {
        background: #fee;
        color: #c33;
        border: 1px solid #fcc;
      }
      .alert-success {
        background: #efe;
        color: #3c3;
        border: 1px solid #cfc;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="navbar-brand">Second Brain</a>
      <div class="navbar-links">
        {% if request.session.get('user_id') %}
        <a href="/dashboard">Dashboard</a>
        <a href="/auth/logout">Logout</a>
        {% else %}
        <a href="/login">Login</a>
        <a href="/signup" class="btn btn-primary">Sign Up</a>
        {% endif %}
      </div>
    </nav>

    {% block content %}{% endblock %}
  </body>
</html>
