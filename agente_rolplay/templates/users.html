{% extends "dashboard.html" %}

{% block dashboard_content %}
<div class="page-header">
    <h1>Users</h1>
    <button class="btn btn-primary" onclick="document.getElementById('addUserModal').classList.add('show')">
        Add User
    </button>
</div>

<table>
    <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="usersTable">
        <tr>
            <td colspan="6" style="text-align: center;">Loading...</td>
        </tr>
    </tbody>
</table>

<div id="addUserModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add User</h2>
            <button class="close" onclick="document.getElementById('addUserModal').classList.remove('show')">&times;</button>
        </div>
        <form id="addUserForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="whatsapp_number">WhatsApp Number</label>
                <input type="text" id="whatsapp_number" name="whatsapp_number" placeholder="+1234567890" required>
            </div>
            <div class="form-group">
                <label for="role_id">Role</label>
                <select id="role_id" name="role_id" required>
                    <option value="">Select a role</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add User</button>
        </form>
    </div>
</div>

<div id="editUserModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit User</h2>
            <button class="close" onclick="document.getElementById('editUserModal').classList.remove('show')">&times;</button>
        </div>
        <form id="editUserForm">
            <input type="hidden" id="edit_user_id">
            <div class="form-group">
                <label for="edit_username">Username</label>
                <input type="text" id="edit_username" name="username">
            </div>
            <div class="form-group">
                <label for="edit_whatsapp_number">WhatsApp Number</label>
                <input type="text" id="edit_whatsapp_number" name="whatsapp_number" placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label for="edit_role_id">Role</label>
                <select id="edit_role_id" name="role_id">
                    <option value="">Select a role</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
        </form>
    </div>
</div>

<script>
let users = [];
let roles = [];

async function loadUsers() {
    try {
        const response = await fetch('/api/users', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
        });
        if (response.status === 401) {
            window.location.href = '/login';
            return;
        }
        users = await response.json();
        renderUsers();
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

async function loadRoles() {
    try {
        const response = await fetch('/api/roles', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
        });
        roles = await response.json();
        
        ['role_id', 'edit_role_id'].forEach(selectId => {
            const select = document.getElementById(selectId);
            roles.forEach(role => {
                const option = document.createElement('option');
                option.value = role.id;
                option.textContent = role.name;
                select.appendChild(option);
            });
        });
    } catch (error) {
        console.error('Error loading roles:', error);
    }
}

function renderUsers() {
    const tbody = document.getElementById('usersTable');
    if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No users found</td></tr>';
        return;
    }
    
    tbody.innerHTML = users.map(user => `
        <tr>
            <td>${user.username || '-'}</td>
            <td>${user.user?.email || '-'}</td>
            <td>${user.whatsapp_number || '-'}</td>
            <td>${user.role?.name || '-'}</td>
            <td>
                <span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">
                    ${user.is_active ? 'Active' : 'Inactive'}
                </span>
            </td>
            <td class="actions">
                <button class="btn btn-sm btn-secondary" onclick="openEditModal('${user.id}')">Edit</button>
                ${user.is_active
                    ? `<button class="btn btn-sm btn-danger" onclick="revokeAccess('${user.id}')">Revoke</button>`
                    : `<button class="btn btn-sm btn-success" onclick="reactivateUser('${user.id}')">Reactivate</button>`
                }
            </td>
        </tr>
    `).join('');
}

async function revokeAccess(userId) {
    if (!confirm('Are you sure you want to revoke access for this user?')) return;
    
    try {
        await fetch(`/api/users/${userId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
        });
        loadUsers();
    } catch (error) {
        console.error('Error revoking access:', error);
    }
}

async function reactivateUser(userId) {
    try {
        await fetch(`/api/users/${userId}/reactivate`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
        });
        loadUsers();
    } catch (error) {
        console.error('Error reactivating user:', error);
    }
}

function openEditModal(userId) {
    const user = users.find(u => u.id === userId);
    if (!user) return;
    document.getElementById('edit_user_id').value = user.id;
    document.getElementById('edit_username').value = user.username || '';
    document.getElementById('edit_whatsapp_number').value = user.whatsapp_number || '';
    const roleSelect = document.getElementById('edit_role_id');
    roleSelect.value = user.role_id || '';
    document.getElementById('editUserModal').classList.add('show');
}

document.getElementById('editUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const userId = document.getElementById('edit_user_id').value;
    const formData = {
        username: document.getElementById('edit_username').value || null,
        whatsapp_number: document.getElementById('edit_whatsapp_number').value || null,
        role_id: document.getElementById('edit_role_id').value || null,
    };
    try {
        const r = await fetch(`/api/users/${userId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('access_token')
            },
            body: JSON.stringify(formData)
        });
        if (r.ok) {
            document.getElementById('editUserModal').classList.remove('show');
            loadUsers();
        }
    } catch (error) {
        console.error('Error updating user:', error);
    }
});

document.getElementById('addUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        whatsapp_number: document.getElementById('whatsapp_number').value,
        role_id: document.getElementById('role_id').value,
        user_id: crypto.randomUUID(),
        org_id: null
    };
    
    try {
        await fetch('/api/users', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('access_token')
            },
            body: JSON.stringify(formData)
        });
        
        document.getElementById('addUserModal').classList.remove('show');
        document.getElementById('addUserForm').reset();
        loadUsers();
    } catch (error) {
        console.error('Error adding user:', error);
    }
});

loadUsers();
loadRoles();
</script>
{% endblock %}
