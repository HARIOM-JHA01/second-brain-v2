<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Second Brain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="/static/theme.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root, [data-theme="dark"] {
        --bg: #07070f;
        --panel-bg: #0d0d1a;
        --surface: rgba(255,255,255,.04);
        --border: rgba(255,255,255,.08);
        --border-focus: #dc2626;
        --text: #ffffff;
        --text-dim: rgba(255,255,255,.65);
        --text-muted: rgba(255,255,255,.38);
        --input-bg: rgba(255,255,255,.05);
        --input-color: #fff;
        --placeholder: rgba(255,255,255,.25);
        --error: #f87171;
        --toggle-bg: rgba(255,255,255,.08);
        --grid: rgba(255,255,255,.03);
        --glow: rgba(220,38,38,.22);
      }
      [data-theme="light"] {
        --bg: #f7f7fc;
        --panel-bg: #fff;
        --surface: #ffffff;
        --border: rgba(0,0,0,.09);
        --border-focus: #dc2626;
        --text: #0d0d18;
        --text-dim: rgba(0,0,0,.65);
        --text-muted: rgba(0,0,0,.4);
        --input-bg: rgba(0,0,0,.03);
        --input-color: #0d0d18;
        --placeholder: rgba(0,0,0,.28);
        --error: #dc2626;
        --toggle-bg: rgba(0,0,0,.07);
        --grid: rgba(0,0,0,.04);
        --glow: rgba(220,38,38,.08);
      }

      html, body { height: 100%; }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        transition: background .3s, color .3s;
        overflow: hidden;
      }

      /* ── Theme toggle ── */
      .theme-toggle {
        position: fixed; top: 1.25rem; right: 1.5rem; z-index: 100;
        width: 36px; height: 36px; border-radius: 9px;
        background: var(--toggle-bg); border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 1rem; transition: all .2s;
      }
      .theme-toggle:hover { background: var(--surface); }

      /* ── Left hero panel ── */
      .panel-hero {
        flex: 1; min-height: 100vh;
        background: #0a0a14;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        position: relative; overflow: hidden;
        padding: 3rem;
      }
      [data-theme="light"] .panel-hero { background: #0d0d1a; }

      /* Grid background */
      .panel-hero::before {
        content: '';
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(220,38,38,.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(220,38,38,.07) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      /* Red glow blob */
      .panel-hero::after {
        content: '';
        position: absolute;
        width: 500px; height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(220,38,38,.18) 0%, transparent 70%);
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .hero-content {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        align-items: center; text-align: center; gap: 2rem;
      }

      .hero-logo {
        width: 180px; height: 180px;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(220,38,38,.25);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 60px rgba(220,38,38,.2), inset 0 0 40px rgba(220,38,38,.06);
        background: #fff url('/static/second-brain-logo.png') no-repeat center center;
        background-size: 240%;
      }

      .hero-text { max-width: 340px; }
      .hero-text h1 {
        font-size: 2rem; font-weight: 900; letter-spacing: -.6px;
        color: #fff; line-height: 1.15; margin-bottom: .75rem;
      }
      .hero-text h1 span { color: #dc2626; }
      .hero-text p {
        font-size: .95rem; color: rgba(255,255,255,.5);
        line-height: 1.65;
      }

      .hero-stats {
        display: flex; gap: 2rem;
      }
      .hero-stat { text-align: center; }
      .hero-stat-value {
        font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: -.4px;
      }
      .hero-stat-label {
        font-size: .72rem; color: rgba(255,255,255,.4);
        text-transform: uppercase; letter-spacing: .6px; margin-top: .15rem;
      }

      /* ── Right form panel ── */
      .panel-form {
        width: 480px; min-width: 480px; min-height: 100vh;
        background: var(--panel-bg);
        border-left: 1px solid var(--border);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 3rem 3rem;
        overflow-y: auto;
        transition: background .3s, border-color .3s;
      }

      .form-inner { width: 100%; max-width: 360px; }

      /* Brand */
      .brand {
        display: flex; align-items: center; gap: 0;
        flex-wrap: nowrap; margin-bottom: 2.5rem;
      }
      .brand-logo img { height: 40px; max-width: 120px; object-fit: contain; object-position: left center; display: block; }
      .brand-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin-right: .6rem; }
      .brand-parent {
        display: flex; align-items: center; gap: .3rem; flex-shrink: 0;
        text-decoration: none; opacity: .65; transition: opacity .2s;
      }
      .brand-parent:hover { opacity: 1; }
      .brand-parent img { height: 22px; object-fit: contain; display: block; }
      .brand-by { font-size: .62rem; font-weight: 500; color: var(--text-muted); letter-spacing: .3px; white-space: nowrap; }

      /* Heading */
      .form-heading { margin-bottom: 2rem; }
      .form-heading h2 {
        font-size: 1.75rem; font-weight: 900; letter-spacing: -.6px;
        color: var(--text); line-height: 1.15; margin-bottom: .4rem;
      }
      .form-heading p { font-size: .9rem; color: var(--text-muted); }

      /* Inputs */
      .form-group { margin-bottom: 1.1rem; }
      .form-group label {
        display: block; font-size: .82rem; font-weight: 600;
        color: var(--text-dim); margin-bottom: .45rem;
      }
      .input-wrap { position: relative; }
      .input-wrap input {
        width: 100%; padding: .85rem 1rem;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: 10px; color: var(--input-color);
        font-size: .95rem; font-family: inherit; outline: none;
        transition: border-color .2s, box-shadow .2s, background .3s;
      }
      .input-wrap input::placeholder { color: var(--placeholder); }
      .input-wrap input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(220,38,38,.12);
      }

      /* Submit */
      .btn-submit {
        width: 100%; padding: .9rem;
        background: linear-gradient(135deg, #dc2626, #991b1b);
        border: none; border-radius: 10px;
        color: #fff; font-size: .95rem; font-weight: 700;
        font-family: inherit; cursor: pointer; margin-top: .75rem;
        box-shadow: 0 4px 20px rgba(220,38,38,.35);
        transition: all .2s; letter-spacing: .1px;
      }
      .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(220,38,38,.5); }
      .btn-submit:active { transform: translateY(0); }
      .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

      /* Error */
      .error-msg {
        display: none; margin-top: .85rem;
        background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2);
        color: var(--error); font-size: .85rem;
        padding: .65rem .85rem; border-radius: 8px;
      }

      /* Footer link */
      .form-footer {
        text-align: center; margin-top: 1.75rem;
        font-size: .88rem; color: var(--text-muted);
      }
      .form-footer a { color: #dc2626; text-decoration: none; font-weight: 600; }
      .form-footer a:hover { text-decoration: underline; }

      /* Divider */
      .form-divider {
        display: flex; align-items: center; gap: .75rem;
        margin: 1.5rem 0;
      }
      .form-divider::before, .form-divider::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
      }
      .form-divider span { font-size: .75rem; color: var(--text-muted); white-space: nowrap; }

      /* Mobile */
      @media (max-width: 768px) {
        body { flex-direction: column; overflow: auto; }
        .panel-hero { display: none; }
        .panel-form { width: 100%; min-width: 0; min-height: 100vh; border-left: none; }
      }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

    <!-- Left hero -->
    <div class="panel-hero">
      <div class="hero-content">
        <div class="hero-logo"></div>
        <div class="hero-text">
          <h1>Your company's knowledge,<br/><span>always within reach.</span></h1>
          <p>Ask questions, upload documents, and get cited answers — all inside WhatsApp.</p>
        </div>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-value">instant</div>
            <div class="hero-stat-label">Answers</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value">cited</div>
            <div class="hero-stat-label">Sources</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value">secure</div>
            <div class="hero-stat-label">Access</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right form -->
    <div class="panel-form">
      <div class="form-inner">

        <div class="brand">
          <a href="/" style="display:flex;align-items:center;text-decoration:none;">
            <div class="brand-logo"><img src="/static/second-brain-logo.png" alt="Second Brain" /></div>
          </a>
          <span class="brand-divider"></span>
          <a href="https://www.rolplay.ai/" class="brand-parent" target="_blank" rel="noopener noreferrer">
            <span class="brand-by">by</span>
            <img src="/static/rolplay-logo.png" alt="Rolplay" />
          </a>
        </div>

        <div class="form-heading">
          <h2>Welcome back</h2>
          <p>Sign in to your workspace</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <input type="email" id="email" name="email" required placeholder="you@company.com" autocomplete="email" />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
            </div>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">Sign In →</button>
        </form>

        <div class="error-msg" id="errorMessage"></div>

        <div class="form-divider"><span>new here?</span></div>

        <div class="form-footer">
          Don't have an account? <a href="/signup">Create one free</a>
        </div>

      </div>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMessage');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        err.style.display = 'none';

        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: document.getElementById('email').value,
              password: document.getElementById('password').value
            })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
          } else {
            err.textContent = data.detail || 'Login failed';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In →';
          }
        } catch (_) {
          err.textContent = 'An error occurred. Please try again.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      });
    </script>
  </body>
</html>
